apiVersion: apps/v1
kind: Deployment
metadata:
  name: ado-workitem-watcher-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ado-workitem-watcher
  template:
    metadata:
      labels:
        app: ado-workitem-watcher
    spec:
      containers:
      - name: ado-workitem-watcher
        image: slmcmahon/ado-workitem-watcher:latest
        env:
        - name: ADO_PAT
          valueFrom:
            configMapKeyRef:
              name: ado-workitem-watcher-config
              key: ado-pat
        - name: ADO_ORG
          valueFrom:
            configMapKeyRef:
              name: ado-workitem-watcher-config
              key: ado-org
        - name: ADO_PROJECT
          valueFrom:
            configMapKeyRef:
              name: ado-workitem-watcher-config
              key: ado-project
        - name: ASB_CONNECTION_STRING
          valueFrom:
            configMapKeyRef:
              name: ado-workitem-watcher-config
              key: asb-connection-string
        - name: ASB_QUEUE
          valueFrom:
            configMapKeyRef:
              name: ado-workitem-watcher-config
              key: asb-queue
        - name: ASB_POLL_INTERVAL_SECONDS
          valueFrom:
            configMapKeyRef:
              name: ado-workitem-watcher-config
              key: asb-poll-interval-seconds
        - name: WI_TEMPLATE_PATH
          valueFrom:
            configMapKeyRef:
              name: ado-workitem-watcher-config
              key: wi-template-path
        resources:
          limits:
            cpu: 900m
            memory: 240Mi
          requests:
            cpu: 300m
            memory: 80Mi
